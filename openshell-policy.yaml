# OpenShell network policy — allows the sandbox to reach a FastAPI app
# on the host machine (port 8000, plain HTTP).
#
# Apply with:
#   openshell policy set <sandbox-name> --policy openshell-policy.yaml --wait
#
# Note: `openshell policy set` replaces the entire policy, so static
# sections (filesystem_policy, landlock, process) must be included.
# Ref: https://docs.nvidia.com/openshell/latest/reference/policy-schema.html
#
# Key details:
#   - `allowed_ips` is required because host.docker.internal resolves to a
#     private IP (192.168.65.0/24 on Docker Desktop). The proxy blocks
#     private/RFC1918 IPs by default as SSRF protection.
#     Ref: https://github.com/NVIDIA/OpenShell/tree/main/examples/private-ip-routing
#   - `protocol` is omitted so the proxy uses TCP passthrough. L7 inspection
#     (`protocol: rest`) requires CONNECT tunneling, but the sandbox http_proxy
#     uses FORWARD mode which is incompatible.

version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  host_fastapi:
    name: host-fastapi-app
    endpoints:
      - host: host.docker.internal
        port: 8000
        tls: skip
        enforcement: enforce
        allowed_ips:
          - "192.168.65.0/24"
    binaries:
      - { path: /** }
