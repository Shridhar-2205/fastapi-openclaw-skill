# OpenShell network policy — allows the sandbox to reach a FastAPI app
# on the host machine (port 8000, plain HTTP).
#
# Apply with:
#   openshell policy set <sandbox-name> --policy openshell-policy.yaml --wait
#
# Note: `openshell policy set` replaces the entire policy, so static
# sections (filesystem_policy, landlock, process) must be included.
# Ref: https://docs.nvidia.com/openshell/latest/reference/policy-schema.html
#
# We omit `protocol: rest` so the proxy uses TCP passthrough instead of
# L7 HTTP inspection. The sandbox http_proxy uses FORWARD mode, but L7
# rules require CONNECT tunneling — omitting `protocol` avoids the
# "endpoint has L7 rules; use CONNECT" denial.

version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  host_fastapi:
    name: host-fastapi-app
    endpoints:
      - host: host.docker.internal
        port: 8000
        tls: skip
        enforcement: enforce
    binaries:
      - { path: /** }
