# OpenShell network policy — allows the sandbox to reach a FastAPI app
# on the host machine (port 8000, plain HTTP).
#
# Apply with:
#   openshell policy set <sandbox-name> --policy openshell-policy.yaml --wait
#
# Hot-reloads without restarting the sandbox.
#
# Note: `openshell policy set` replaces the entire policy, so static
# sections (filesystem_policy, landlock, process) must be included.
# Ref: https://docs.nvidia.com/openshell/latest/reference/policy-schema.html

version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  host_fastapi:
    name: host-fastapi-app
    endpoints:
      - host: host.docker.internal
        port: 8000
        protocol: rest
        tls: skip
        enforcement: enforce
        access: read-write
    binaries:
      - { path: /** }
